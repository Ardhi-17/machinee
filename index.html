<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nada's Safe Place ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d6d;
            --bg: #fff0f3;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden; /* Supaya tombol gak bikin scroll saat kabur */
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 35px 25px;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(255, 77, 109, 0.2);
            width: 85%;
            max-width: 380px;
            text-align: center;
            position: relative;
            z-index: 10;
            border: 4px solid white;
        }

        h1 { color: var(--primary); font-size: 1.6rem; margin-bottom: 20px; }

        .button-stack {
            display: grid;
            gap: 15px;
        }

        /* Tombol Normal */
        .btn-main {
            padding: 16px;
            border: none;
            border-radius: 20px;
            background: white;
            color: #444;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid #ffe5ec;
        }

        .btn-main:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-3px);
        }

        /* Tombol Prank Nyerah */
        #btn-nyerah {
            padding: 15px;
            border-radius: 20px;
            background: #eee;
            color: #888;
            border: 1px dashed #ccc;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.1s ease; /* Transisi cepat biar kaburnya lincah */
            position: relative;
            z-index: 999;
        }

        .heart-particle {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            font-size: 24px;
        }

        #result-card {
            margin-top: 25px;
            padding: 15px;
            border-radius: 20px;
            background: #fff5f7;
            display: none;
            border: 2px solid var(--primary);
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Semangat Terus, Nadaaa! ❤️</h1>
        <p style="color: #888; font-size: 0.9rem;">Klik tombol di bawah sesuai mood kamu:</p>
        
        <div class="button-stack">
            <button class="btn-main" onclick="showEnergy(event, 'booster')">⚡ Mood Booster</button>
            <button class="btn-main" onclick="showEnergy(event, 'hug')">🫂 Virtual Hug</button>
            
            <button id="btn-nyerah" onmouseover="dodge()" ontouchstart="dodge()">🏳️ Mau Nyerah Aja</button>
        </div>

        <div id="result-card">
            <div id="res-icon" style="font-size: 30px;"></div>
            <p id="res-text" style="font-weight: 700; color: #333; margin: 5px 0;"></p>
            <p id="res-sub" style="font-size: 0.85rem; color: #666;"></p>
        </div>
    </div>

    <script>
        // Efek Ledakan Hati
        function explode(x, y) {
            for (let i = 0; i < 15; i++) {
                const p = document.createElement('div');
                p.className = 'heart-particle';
                p.innerHTML = ['❤️', '💖', '✨', '💝'][Math.floor(Math.random() * 4)];
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                document.body.appendChild(p);

                const destX = (Math.random() - 0.5) * 300;
                const destY = (Math.random() - 0.5) * 300;

                p.animate([
                    { transform: 'translate(-50%, -50%) scale(0)', opacity: 1 },
                    { transform: `translate(${destX}px, ${destY}px) scale(1.5) rotate(${Math.random()*360}deg)`, opacity: 0 }
                ], { duration: 1000, easing: 'ease-out' }).onfinish = () => p.remove();
            }
        }

        // Fungsi Tombol Positif
        function showEnergy(e, type) {
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);
            explode(x, y);

            const card = document.getElementById('result-card');
            card.style.display = 'block';

            if(type === 'booster') {
                document.getElementById('res-icon').innerHTML = '🚀';
                document.getElementById('res-text').innerHTML = 'POWER UP!';
                document.getElementById('res-sub').innerHTML = 'Nadaaa hebat, Nadaaa kuat, Semangat Nadaaaa!';
            } else {
                document.getElementById('res-icon').innerHTML = '💝';
                document.getElementById('res-text').innerHTML = 'Nadaaa Cantikkk!';
                document.getElementById('res-sub').innerHTML = 'Semangat yaaa, kan ada Abang di sini hehehe.';
            }
        }

        // LOGIKA TOMBOL KABUR (DODGE)
        function dodge() {
            const btn = document.getElementById('btn-nyerah');
            
            // Kalkulasi posisi random agar tidak keluar layar
            const padding = 50;
            const newX = Math.random() * (window.innerWidth - btn.clientWidth - padding);
            const newY = Math.random() * (window.innerHeight - btn.clientHeight - padding);
            
            btn.style.position = 'fixed';
            btn.style.left = newX + 'px';
            btn.style.top = newY + 'px';
            
            // Ubah teks saat dia mencoba klik
            const trollTexts = ["Gak Kena! 😜", "Eits! 😋", "Mau ke mana? 😝", "No Way! 🚫", "Dilarang Nyerah! 🙅‍♂️"];
            btn.innerHTML = trollTexts[Math.floor(Math.random() * trollTexts.length)];
        }
    </script>
</body>
</html>
